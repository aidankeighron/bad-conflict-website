---
layout: default
---

{% include prohead.html %}

<div class="bio">
    Bad Conflict Combat Robotics Team<br>
    Competing at antweight competitions<br>
    <p class="anilink">
    <a href="{{ site.url }}{{ site.baseurl }}/authors/">Team Members</a>
    <br>
    <a href="{{ site.url }}{{ site.baseurl }}/archive/">All Robots</a>
    </p>
</div>

<h2 style="margin-bottom: 10px;">Robots</h2>

<div class="card-list oi" id="Blog">
    {% for post in site.posts limit:6 %}
    <a href="{{ site.url }}{{ site.baseurl }}{{ post.url }}" class="mr-20">
      <div class="card-wrapper">
        <div class="background"></div>
        <img class="image lazyload" src="{{ site.url }}{{ site.baseurl }}/{{ post.image}}" alt="{{ post.title }}">
        <div class="kepala p-24"><h1 class="judul">{{ post.title }}</h1><p>{{ post.description }}</p></div>
      </div>
    </a>
    {% endfor %}
</div>

<a class="soft-button" href="{{ site.url }}{{ site.baseurl }}/" style="display: flex;align-items: center;">
    <span>See all robots</span>
    <svg xmlns="http://www.w3.org/2000/svg" style="height: 18px;margin-left: 7px;" fill="none" viewBox="0 0 24 24" stroke="var(--main-text-color)"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
</a>
